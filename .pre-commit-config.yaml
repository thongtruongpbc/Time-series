repos:
  # 1. Kiểm tra chuẩn Conventional Commits cho tin nhắn commit
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  # 2. Các công cụ kiểm tra file vật lý
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace    # Xóa khoảng trắng thừa cuối dòng
      - id: end-of-file-fixer      # Đảm bảo file kết thúc bằng một dòng trống
      - id: check-yaml             # Kiểm tra cú pháp file .yaml
      - id: check-added-large-files # Chặn file > 5MB (tránh commit nhầm model .pth)
        args: ['--maxkb=5000']
      - id: check-case-conflict    # Chặn lỗi trùng tên file trên các HĐH khác nhau

  # 3. Tự động format code theo chuẩn Black (giúp code sạch hơn)
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3
